<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: white;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        header p {
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
        }

        .task-form {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .task-form h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.5em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card.pending h3 { color: #ffc107; }
        .stat-card.in-progress h3 { color: #17a2b8; }
        .stat-card.completed h3 { color: #28a745; }
        .stat-card.total h3 { color: #667eea; }

        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }

        .filters {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .filters select {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95em;
        }

        .task-list {
            display: grid;
            gap: 15px;
        }

        .task-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .task-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .task-checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .task-title.completed {
            text-decoration: line-through;
            color: #999;
        }

        .task-description {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .task-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .task-badge.status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .task-badge.status-in-progress {
            background: #d1ecf1;
            color: #0c5460;
        }

        .task-badge.status-completed {
            background: #d4edda;
            color: #155724;
        }

        .task-badge.status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .task-badge.priority-low {
            background: #e2e3e5;
            color: #383d41;
        }

        .task-badge.priority-medium {
            background: #cce5ff;
            color: #004085;
        }

        .task-badge.priority-high {
            background: #fff3cd;
            color: #856404;
        }

        .task-badge.priority-urgent {
            background: #f8d7da;
            color: #721c24;
        }

        .task-badge.category {
            background: #e7e3ff;
            color: #4338ca;
        }

        .task-due-date {
            color: #888;
            font-size: 0.85em;
        }

        .task-due-date.overdue {
            color: #dc3545;
            font-weight: 600;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .empty-state h3 {
            color: #666;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #999;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }

        .toast.success {
            background: #28a745;
        }

        .toast.error {
            background: #dc3545;
        }

        .toast.show {
            opacity: 1;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Task Manager</h1>
            <p>Organize your tasks efficiently</p>
        </header>

        <div class="task-form">
            <h2>Create New Task</h2>
            <form id="taskForm">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="title">Task Title *</label>
                        <input type="text" id="title" name="title" required placeholder="Enter task title">
                    </div>
                    <div class="form-group full-width">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Enter task description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status">
                            <option value="PENDING">Pending</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="COMPLETED">Completed</option>
                            <option value="CANCELLED">Cancelled</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="priority">Priority</label>
                        <select id="priority" name="priority">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                            <option value="URGENT">Urgent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category">
                            <option value="">Select category</option>
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="datetime-local" id="dueDate" name="dueDate">
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: right;">
                    <button type="submit" class="btn btn-primary">Create Task</button>
                </div>
            </form>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card total">
                <h3 id="totalTasks">0</h3>
                <p>Total Tasks</p>
            </div>
            <div class="stat-card pending">
                <h3 id="pendingTasks">0</h3>
                <p>Pending</p>
            </div>
            <div class="stat-card in-progress">
                <h3 id="inProgressTasks">0</h3>
                <p>In Progress</p>
            </div>
            <div class="stat-card completed">
                <h3 id="completedTasks">0</h3>
                <p>Completed</p>
            </div>
        </div>

        <div class="filters">
            <select id="filterStatus">
                <option value="">All Status</option>
                <option value="PENDING">Pending</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="COMPLETED">Completed</option>
                <option value="CANCELLED">Cancelled</option>
            </select>
            <select id="filterPriority">
                <option value="">All Priorities</option>
                <option value="LOW">Low</option>
                <option value="MEDIUM">Medium</option>
                <option value="HIGH">High</option>
                <option value="URGENT">Urgent</option>
            </select>
            <input type="text" class="search-input" id="searchInput" placeholder="Search tasks...">
        </div>

        <div class="task-list" id="taskList">
            <div class="empty-state">
                <h3>No tasks found</h3>
                <p>Create your first task above</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Task</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="editTitle">Task Title *</label>
                        <input type="text" id="editTitle" name="title" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="editDescription">Description</label>
                        <textarea id="editDescription" name="description"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="editStatus">Status</label>
                        <select id="editStatus" name="status">
                            <option value="PENDING">Pending</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="COMPLETED">Completed</option>
                            <option value="CANCELLED">Cancelled</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editPriority">Priority</label>
                        <select id="editPriority" name="priority">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM">Medium</option>
                            <option value="HIGH">High</option>
                            <option value="URGENT">Urgent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editCategory">Category</label>
                        <select id="editCategory" name="category">
                            <option value="">Select category</option>
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="editDueDate">Due Date</label>
                        <input type="datetime-local" id="editDueDate" name="dueDate">
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: right; display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Update Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_BASE = '/api/tasks';
        let allTasks = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('taskForm').addEventListener('submit', handleCreateTask);
            document.getElementById('editForm').addEventListener('submit', handleUpdateTask);
            document.getElementById('filterStatus').addEventListener('change', filterTasks);
            document.getElementById('filterPriority').addEventListener('change', filterTasks);
            document.getElementById('searchInput').addEventListener('input', filterTasks);
        }

        async function loadTasks() {
            try {
                const response = await fetch(API_BASE);
                if (!response.ok) throw new Error('Failed to load tasks');
                allTasks = await response.json();
                updateStats();
                renderTasks(allTasks);
            } catch (error) {
                showToast('Error loading tasks: ' + error.message, 'error');
                console.error('Load tasks error:', error);
            }
        }

        async function handleCreateTask(e) {
            e.preventDefault();
            const formData = {
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                status: document.getElementById('status').value,
                priority: document.getElementById('priority').value,
                category: document.getElementById('category').value,
                dueDate: document.getElementById('dueDate').value
            };

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) throw new Error('Failed to create task');
                
                showToast('Task created successfully', 'success');
                document.getElementById('taskForm').reset();
                await loadTasks();
            } catch (error) {
                showToast('Error creating task: ' + error.message, 'error');
                console.error('Create task error:', error);
            }
        }

        async function handleUpdateTask(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const formData = {
                title: document.getElementById('editTitle').value,
                description: document.getElementById('editDescription').value,
                status: document.getElementById('editStatus').value,
                priority: document.getElementById('editPriority').value,
                category: document.getElementById('editCategory').value,
                dueDate: document.getElementById('editDueDate').value
            };

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (!response.ok) throw new Error('Failed to update task');
                
                showToast('Task updated successfully', 'success');
                closeEditModal();
                await loadTasks();
            } catch (error) {
                showToast('Error updating task: ' + error.message, 'error');
                console.error('Update task error:', error);
            }
        }

        async function completeTask(id) {
            try {
                const response = await fetch(`${API_BASE}/${id}/complete`, {
                    method: 'POST'
                });

                if (!response.ok) throw new Error('Failed to complete task');
                
                showToast('Task completed', 'success');
                await loadTasks();
            } catch (error) {
                showToast('Error completing task: ' + error.message, 'error');
                console.error('Complete task error:', error);
            }
        }

        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task?')) return;

            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'DELETE'
                });

                if (!response.ok) throw new Error('Failed to delete task');
                
                showToast('Task deleted', 'success');
                await loadTasks();
            } catch (error) {
                showToast('Error deleting task: ' + error.message, 'error');
                console.error('Delete task error:', error);
            }
        }

        function openEditModal(task) {
            document.getElementById('editId').value = task.id;
            document.getElementById('editTitle').value = task.title;
            document.getElementById('editDescription').value = task.description || '';
            document.getElementById('editStatus').value = task.status;
            document.getElementById('editPriority').value = task.priority;
            document.getElementById('editCategory').value = task.category || '';
            
            if (task.dueDate) {
                const date = new Date(task.dueDate);
                document.getElementById('editDueDate').value = date.toISOString().slice(0, 16);
            }
            
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            document.getElementById('editForm').reset();
        }

        function filterTasks() {
            const statusFilter = document.getElementById('filterStatus').value;
            const priorityFilter = document.getElementById('filterPriority').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filtered = allTasks;

            if (statusFilter) {
                filtered = filtered.filter(t => t.status === statusFilter);
            }

            if (priorityFilter) {
                filtered = filtered.filter(t => t.priority === priorityFilter);
            }

            if (searchTerm) {
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(searchTerm) ||
                    (t.description && t.description.toLowerCase().includes(searchTerm))
                );
            }

            renderTasks(filtered);
        }

        function updateStats() {
            const total = allTasks.length;
            const pending = allTasks.filter(t => t.status === 'PENDING').length;
            const inProgress = allTasks.filter(t => t.status === 'IN_PROGRESS').length;
            const completed = allTasks.filter(t => t.status === 'COMPLETED').length;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('pendingTasks').textContent = pending;
            document.getElementById('inProgressTasks').textContent = inProgress;
            document.getElementById('completedTasks').textContent = completed;
        }

        function renderTasks(tasks) {
            const taskList = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="empty-state">
                        <h3>No tasks found</h3>
                        <p>Create your first task above</p>
                    </div>
                `;
                return;
            }

            taskList.innerHTML = tasks.map(task => {
                const dueDateClass = task.dueDate && new Date(task.dueDate) < new Date() ? 'overdue' : '';
                const dueDateStr = task.dueDate ? formatDate(task.dueDate) : '';
                
                return `
                    <div class="task-card" data-id="${task.id}">
                        <input type="checkbox" class="task-checkbox" 
                            ${task.status === 'COMPLETED' ? 'checked' : ''} 
                            onchange="toggleComplete(${task.id})">
                        <div class="task-content">
                            <div class="task-title ${task.status === 'COMPLETED' ? 'completed' : ''}">${escapeHtml(task.title)}</div>
                            ${task.description ? `<div class="task-description">${escapeHtml(task.description)}</div>` : ''}
                            <div class="task-meta">
                                <span class="task-badge status-${task.status.toLowerCase().replace('_', '-')}">${formatStatus(task.status)}</span>
                                <span class="task-badge priority-${task.priority.toLowerCase()}">${task.priority}</span>
                                ${task.category ? `<span class="task-badge category">${escapeHtml(task.category)}</span>` : ''}
                                ${dueDateStr ? `<span class="task-due-date ${dueDateClass}">Due: ${dueDateStr}</span>` : ''}
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="btn btn-sm btn-success" onclick="completeTask(${task.id})">Complete</button>
                            <button class="btn btn-sm btn-secondary" onclick="openEditModal(${JSON.stringify(task).replace(/"/g, '&quot;')})">Edit</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleComplete(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;

            const newStatus = task.status === 'COMPLETED' ? 'PENDING' : 'COMPLETED';
            
            try {
                const response = await fetch(`${API_BASE}/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) throw new Error('Failed to update task');
                
                showToast(`Task ${newStatus === 'COMPLETED' ? 'completed' : 'reopened'}`, 'success');
                await loadTasks();
            } catch (error) {
                showToast('Error updating task: ' + error.message, 'error');
                console.error('Toggle complete error:', error);
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatStatus(status) {
            const statusMap = {
                'PENDING': 'Pending',
                'IN_PROGRESS': 'In Progress',
                'COMPLETED': 'Completed',
                'CANCELLED': 'Cancelled'
            };
            return statusMap[status] || status;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        window.addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
